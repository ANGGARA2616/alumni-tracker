<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pelacakan Alumni</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="dark-theme">
    <div class="background-anim"></div>
    <header class="glassmorphic">
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i> AlumniTracker
        </div>
        <div class="controls">
            <button id="themeToggle" class="btn-icon"><i class="fa-solid fa-sun"></i></button>
        </div>
    </header>

    <main class="container">
        <section class="controls-section glassmorphic panel">
            <h2><i class="fa-solid fa-cogs"></i> Kontrol Sistem</h2>
            <div class="actions">
                <button id="btnTriggerAll" class="btn-primary"><i class="fa-solid fa-bolt"></i> Jalankan Pelacakan
                    Berkala</button>
                <button id="btnAddNew" class="btn-secondary"><i class="fa-solid fa-plus"></i> Tambah Alumni</button>

                <button id="btnDeleteAll" class="btn-secondary"
                    style="color: var(--danger); border-color: var(--danger);"><i class="fa-solid fa-trash-can"></i>
                    Hapus Semua Data</button>
            </div>
        </section>

        <section class="data-section glassmorphic panel">
            <div class="panel-header">
                <h2><i class="fa-solid fa-users-viewfinder"></i> Data Alumni & Status</h2>
                <div class="filter-group">
                    <select id="statusFilter">
                        <option value="all">Semua Status</option>
                        <option value="Kemungkinan Kuat">Kemungkinan Kuat</option>
                        <option value="Perlu Verifikasi Manual">Perlu Verifikasi</option>
                        <option value="Belum Ditemukan">Belum Ditemukan</option>
                        <option value="Tidak Cocok">Tidak Cocok</option>
                        <option value="Belum Dilacak">Belum Dilacak</option>
                    </select>
                </div>
            </div>

            <div class="table-container">
                <table id="alumniTable">
                    <thead>
                        <tr>
                            <th>Nama Lengkap</th>
                            <th>Info Kampus</th>
                            <th>Status Pelacakan</th>
                            <th>Opt-Out (Bypass)</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="alumniTbody">
                        <!-- Data populated by JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Verify Modal -->
        <div id="verifyModal" class="modal">
            <div class="modal-content glassmorphic">
                <span class="close" id="closeModal">&times;</span>
                <h2>Verifikasi Manual</h2>
                <div id="verifyDetails"></div>
            </div>
        </div>

        <!-- Add Alumni Modal -->
        <div id="addModal" class="modal">
            <div class="modal-content glassmorphic" style="max-width: 500px;">
                <span class="close" id="closeAddModal">&times;</span>
                <h2 style="margin-bottom: 1rem;">Tambah Alumni Baru</h2>
                <form id="addAlumniForm" style="display: flex; flex-direction: column; gap: 1rem;">
                    <div>
                        <label style="font-size: 0.9rem; margin-bottom: 0.3rem; display: block;">Nama Lengkap*</label>
                        <input type="text" id="addName" required
                            style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: var(--text-primary);">
                    </div>
                    <div>
                        <label style="font-size: 0.9rem; margin-bottom: 0.3rem; display: block;">Nama Kampus</label>
                        <input type="text" id="addNamaKampus"
                            style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: var(--text-primary);"
                            placeholder="Contoh: Universitas Muhammadiyah Malang">
                    </div>
                    <div>
                        <label style="font-size: 0.9rem; margin-bottom: 0.3rem; display: block;">Singkatan
                            Kampus*</label>
                        <input type="text" id="addSingkatanKampus" required
                            style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: var(--text-primary);"
                            placeholder="e.g. UMM">
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.9rem; margin-bottom: 0.3rem; display: block;">Program
                                Studi</label>
                            <input type="text" id="addProdi"
                                style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: var(--text-primary);">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.9rem; margin-bottom: 0.3rem; display: block;">Fakultas</label>
                            <input type="text" id="addFakultas"
                                style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: var(--text-primary);">
                        </div>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.9rem; margin-bottom: 0.3rem; display: block;">Tahun Masuk</label>
                            <input type="number" id="addYearIn"
                                style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: var(--text-primary);"
                                placeholder="YYYY">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.9rem; margin-bottom: 0.3rem; display: block;">Tahun Lulus</label>
                            <input type="number" id="addYearOut"
                                style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: var(--text-primary);"
                                placeholder="YYYY">
                        </div>
                    </div>
                    <div>
                        <label style="font-size: 0.9rem; margin-bottom: 0.3rem; display: block;">Kota Asal</label>
                        <input type="text" id="addKotaAsal"
                            style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: var(--text-primary);">
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top: 0.5rem; padding: 0.8rem;"><i
                            class="fa-solid fa-save"></i> Simpan Data Alumni</button>
                </form>
            </div>
        </div>

        <!-- Custom Confirmation Modal -->
        <div id="confirmModal" class="modal">
            <div class="modal-content glassmorphic confirm-dialog">
                <div class="confirm-icon-wrapper">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h2 id="confirmTitle" class="confirm-title">Konfirmasi</h2>
                <p id="confirmMessage" class="confirm-message"></p>
                <div class="confirm-actions">
                    <button id="btnConfirmCancel" class="btn-secondary confirm-btn">Batal</button>
                    <button id="btnConfirmOk" class="btn-confirm-danger confirm-btn">Ya, Hapus</button>
                </div>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="/static/js/app.js?v=4"></script>
</body>

</html>
