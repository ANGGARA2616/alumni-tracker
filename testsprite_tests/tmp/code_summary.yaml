version: "2"
type: backend
tech_stack:
  - python
  - fastapi
  - sqlite
  - apscheduler
features:
  - name: Alumni Profiling
    description: CRUD operations for alumni data
    files:
      - main.py
      - schemas.py
      - models.py
      - services/tracking_logic.py
    endpoints:
      - method: GET
        path: /api/alumni/
        description: Returns a list of all alumni
        auth_required: false
      - method: POST
        path: /api/alumni/
        description: Creates a new alumni record
        auth_required: false
      - method: PUT
        path: /api/alumni/{alumni_id}/opt_out
        description: Update opt_out status for an alumni
        auth_required: false
      - method: POST
        path: /api/trigger_tracking/{alumni_id}
        description: Trigger test tracking logic for a specific alumni id
        auth_required: false
      - method: POST
        path: /api/trigger_tracking_all
        description: Trigger test tracking logic for all valid alumni records
        auth_required: false
known_limitations: []
